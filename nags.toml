schema = 1
app = "factory"

[build]
command = """export MISE_BUN_VERSION=1.3.11
bun install --cwd web --frozen-lockfile
bun run --cwd web build
mkdir -p api/dist/assets
cp -R web/dist/. api/dist/
go build -trimpath -ldflags="-s -w" -o factory-api ./api
go build -trimpath -ldflags="-s -w" -o factory ./cli"""

[run]
command = """FACTORY_RELEASE_COMMIT="$NAGS_SOURCE_COMMIT" \
FACTORY_RELEASE_TREE="$NAGS_SOURCE_TREE" \
FACTORY_RELEASE_BUILD="$NAGS_BUILD_ID" \
FACTORY_RELEASE_DEPLOYMENT="$NAGS_DEPLOYMENT_ID" \
FACTORY_RELEASE_CONTRACT="$NAGS_CONTRACT_VERSION" \
./factory-api"""

[health]
path = "/api/health"
identity = true
