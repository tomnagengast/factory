schema = 1
app = "factory"

[build]
command = """export MISE_BUN_VERSION=1.3.11
bun install --cwd web --frozen-lockfile
bun run --cwd web build
mkdir -p api/dist/assets
cp -R web/dist/. api/dist/
go build -trimpath -ldflags="-s -w" -o factory-api ./api
go build -trimpath -ldflags="-s -w" -o factory ./cli"""

[run]
command = "./factory-api"

[health]
path = "/api/health"
identity = true
