# Factory service manifest (sourced by bin/network-app; see docs/adding-apps.md)
SERVICE_PORT=8092
SERVICE_RUN="./factory serve"
SERVICE_BUILD='export MISE_BUN_VERSION=1.3.11; bun install --cwd frontend --frozen-lockfile && bun run --cwd frontend build && go build -trimpath -ldflags="-s -w -X main.buildCommit=${NETWORK_APP_SOURCE_COMMIT} -X main.buildTree=${NETWORK_APP_SOURCE_TREE} -X main.buildID=${NETWORK_APP_BUILD_ID} -X main.buildDeploymentID=${NETWORK_APP_DEPLOYMENT_ID} -X main.buildContractVersion=${NETWORK_APP_CONTRACT_VERSION}" -o factory .'
SERVICE_HEALTHZ="/api/healthz"
SERVICE_HEALTH_IDENTITY=true
